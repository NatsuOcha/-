<body>
    <section class="game-card">
        <h1>猜数字小游戏</h1>
        <p>系统已随机生成一个 1 到 100 之间的整数。请输入你的猜测，然后点击“提交”。页面会给出提示。你可以随时点击“重置”重新开始。</p>

        <div class="input-group">
            <input id="guessInput" type="number" placeholder="请输入 1 - 100 之间的数字" min="1" max="100" />
        </div>

        <div class="button-group">
            <button id="submitBtn" class="button-submit" type="button">提交答案</button>
            <button id="resetBtn" class="button-reset" type="button">重置游戏</button>
        </div>

        <div id="resultHint" class="hint-box">请先输入一个数字，然后提交猜测。</div>

        <div class="footer" id="statusText">
            已尝试次数：0 次
        </div>
    </section>

    <script>
        const guessInput = document.getElementById("guessInput");
        const submitBtn = document.getElementById("submitBtn");
        const resetBtn = document.getElementById("resetBtn");
        const resultHint = document.getElementById("resultHint");
        const statusText = document.getElementById("statusText");

        let targetNumber = 0;
        let attemptCount = 0;
        let gameOver = false;

        function initGame() {
            targetNumber = Math.floor(Math.random() * 100) + 1;
            attemptCount = 0;
            gameOver = false;
            guessInput.value = "";
            guessInput.disabled = false;
            resultHint.textContent = "请先输入一个数字，然后提交猜测。";
            resultHint.className = "hint-box";
            statusText.textContent = "已尝试次数：0 次";
        }

        function updateStatus() {
            statusText.textContent = `已尝试次数：${attemptCount} 次`;
        }

        function showHint(message, type = "") {
            resultHint.textContent = message;
            resultHint.className = `hint-box${type ? ` ${type}` : ""}`;
        }

        function handleSubmit() {
            if (gameOver) {
                showHint("游戏已结束，请点击重置开始新一轮。", "warning");
                return;
            }

            const guessValue = Number(guessInput.value);
            if (!guessValue || guessValue < 1 || guessValue > 100) {
                showHint("请输入 1 到 100 的有效数字。", "warning");
                return;
            }

            attemptCount += 1;
            updateStatus();

            if (guessValue === targetNumber) {
                showHint(`恭喜你！猜对了，答案就是 ${targetNumber}。你一共尝试了 ${attemptCount} 次。`, "success");
                gameOver = true;
                guessInput.disabled = true;
            } else if (guessValue < targetNumber) {
                showHint("太小了，再往大一点试试。", "warning");
            } else {
                showHint("太大了，往小一点试试。", "warning");
            }
        }

        submitBtn.addEventListener("click", handleSubmit);
        resetBtn.addEventListener("click", initGame);
        guessInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                handleSubmit();
            }
        });

        initGame();
    </script>
</body>
</html>
